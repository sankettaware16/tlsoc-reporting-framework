# ===========================================================================
# Instance settings - the ONLY file that knows about YOUR deployment.
#
# ZERO-CONFIG on TLSOC hosts: if this machine runs the TLSOC docker stack
# (default location /opt/TLSOCDockerDeploy), leave the elasticsearch block
# exactly as it is. Host, password and CA certificate are auto-detected
# from the deployment's own .env and certs/ - nothing to fill in.
#
# On any other machine, either fill the values below or export env vars:
#     TLSOC_ES_HOST, TLSOC_ES_USER, TLSOC_ES_PASS, TLSOC_ES_CA_CERT
# Secrets: NEVER commit a password here - use the env var / .env file.
# ===========================================================================

elasticsearch:
  host: ""              # empty = auto-detect; else e.g. https://YOUR-ELK-HOST:9200
  user: "elastic"
  password: ""          # empty = auto-detect; prefer TLSOC_ES_PASS env var
  ca_cert: null         # null = auto-detect from <deploy dir>/certs/ca/ca.crt
  request_timeout: 120

# Where the co-located TLSOC docker stack lives (used for auto-detection).
tlsoc_deploy:
  autodetect: true
  dir: "/opt/TLSOCDockerDeploy"

org:
  name: "IIT Bombay"
  department: "Computing Complex"
  classification: "Internal / Restricted"

locale:
  timezone: "Asia/Kolkata"        # all report times render in this zone
  tz_label: "IST"

output:
  # Default: <repo>/output/{html,pdf}. Uncomment to redirect.
  # html_dir: "/srv/reports/html"
  # pdf_dir:  "/srv/reports/pdf"
  formats: [html, pdf]

pdf:
  # Tried in order; first engine present on the host wins.
  engines: [wkhtmltopdf, chrome, weasyprint]
  # wkhtmltopdf_path: /usr/local/bin/wkhtmltopdf
  # chrome_path: /usr/bin/google-chrome
