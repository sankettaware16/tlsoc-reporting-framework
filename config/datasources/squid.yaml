# ===========================================================================
# Datasource: Squid forward proxy (parsed by foss-soc-engine).
# ===========================================================================
name: squid
label: "Internet Gateway (Squid Forward Proxy)"
profile: proxy
index: "fosstlsoc-logs-squid*"

fields:
  timestamp: "@timestamp"
  client_ip: "source.ip"
  client_port: "source.port"
  dest_ip: "destination.ip"
  dest_port: "destination.port"
  bytes: "source.bytes"
  duration_ms: "event.duration"
  cache_action: "event.action.keyword"
  outcome: "event.outcome.keyword"
  status_code: "http.response.status_code"
  method: "http.request.method.keyword"
  protocol: "network.protocol.keyword"
  # proxy_host: "host.name"  # not indexed here - see note below
  original_destination: "squid.original_destination.keyword"

# The originating host (e.g. the specific mail or proxy server) is NOT
# indexed on this estate: it appears only inside event.original and is
# never extracted at parse time. The mapping above is therefore commented
# out, so any section that groups by it is omitted rather than failing.
#
# To enable it, add a grok field for the hostname in the log pipeline,
# then uncomment the line and re-run:
#     python3 -m framework check-fields --datasource squid

params: {}
